<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e0e10"/>
      <stop offset="100%" stop-color="#1a1a20"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.8" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#f7b32b" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#f7b32b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f2530"/>
      <stop offset="50%" stop-color="#2a3142"/>
      <stop offset="100%" stop-color="#13171f"/>
    </linearGradient>
    <linearGradient id="ventGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#08090d"/>
      <stop offset="100%" stop-color="#1a1f29"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Top amber strip with contact -->
  <rect x="0" y="0" width="1200" height="42" fill="#f7b32b"/>
  <text x="50" y="28" font-family="JetBrains Mono, monospace" font-size="14" font-weight="500" fill="#0e0e10" letter-spacing="2">◆ KIRLOSKAR DEALER · GHAZIABAD · DELHI NCR</text>
  <text x="1150" y="28" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="14" font-weight="700" fill="#0e0e10" letter-spacing="1">NIKHIL GARG · +91 95555 76155</text>

  <!-- Logo -->
  <circle cx="80" cy="100" r="6" fill="#f7b32b"/>
  <text x="100" y="107" font-family="Archivo Black, sans-serif" font-size="22" fill="#f4f4f0" letter-spacing="-1">HANUMANT&#160;GENERATORS</text>

  <!-- Tag -->
  <line x1="80" y1="170" x2="120" y2="170" stroke="#f7b32b" stroke-width="2"/>
  <text x="135" y="175" font-family="JetBrains Mono, monospace" font-size="14" fill="#f7b32b" letter-spacing="3">KIRLOSKAR · SALES · RENTALS · AMC</text>

  <!-- Headline -->
  <text x="80" y="290" font-family="Archivo Black, sans-serif" font-size="92" fill="#f4f4f0" letter-spacing="-3">Power that</text>
  <text x="80" y="380" font-family="Manrope, sans-serif" font-style="italic" font-size="92" font-weight="300" fill="#f7b32b" letter-spacing="-3">doesn't blink.</text>

  <!-- Subline -->
  <text x="80" y="450" font-family="Manrope, sans-serif" font-size="22" fill="#a8a8a0">Diesel generators · 5 kVA to 500 kVA · 24/7 service backup</text>

  <!-- Chip row -->
  <g font-family="JetBrains Mono, monospace" font-size="13" letter-spacing="1">
    <rect x="80" y="490" width="170" height="38" rx="2" fill="none" stroke="#2a2a2e"/>
    <text x="100" y="514" fill="#f4f4f0">⚡ 5 – 500 kVA</text>

    <rect x="265" y="490" width="170" height="38" rx="2" fill="none" stroke="#2a2a2e"/>
    <text x="285" y="514" fill="#f4f4f0">◆ CPCB IV+</text>

    <rect x="450" y="490" width="170" height="38" rx="2" fill="none" stroke="#2a2a2e"/>
    <text x="470" y="514" fill="#f4f4f0">▼ 75 dB silent</text>

    <rect x="635" y="490" width="170" height="38" rx="2" fill="none" stroke="#f7b32b"/>
    <text x="655" y="514" fill="#f7b32b">★ 48hr delivery</text>
  </g>

  <!-- Footer line -->
  <line x1="80" y1="580" x2="1120" y2="580" stroke="#2a2a2e"/>
  <text x="80" y="610" font-family="JetBrains Mono, monospace" font-size="12" fill="#a8a8a0" letter-spacing="2">HANUMANTGENERATORS.IN  ·  INFO@HANUMANTGENERATORS.IN  ·  NIKHIL GARG +91 95555 76155</text>

  <!-- ==== GENERATOR ILLUSTRATION (right side) ==== -->
  <g transform="translate(780, 90) scale(1.05)">
    <!-- Smoke -->
    <g opacity="0.55">
      <ellipse cx="240" cy="-10" rx="36" ry="24" fill="#c4c8d0"/>
      <ellipse cx="230" cy="20" rx="28" ry="20" fill="#a8aeb8"/>
      <ellipse cx="245" cy="50" rx="22" ry="14" fill="#9098a4"/>
    </g>

    <!-- Exhaust -->
    <rect x="232" y="80" width="16" height="38" fill="#0d0d10" stroke="#2a2a2e" stroke-width="1"/>

    <!-- Shadow -->
    <ellipse cx="170" cy="475" rx="150" ry="9" fill="#000" opacity="0.6"/>

    <!-- Body -->
    <rect x="30" y="118" width="290" height="338" rx="6" fill="url(#bodyGrad)" stroke="#2a2a2e" stroke-width="2"/>

    <!-- Top vents -->
    <rect x="50" y="135" width="250" height="50" rx="3" fill="url(#ventGrad)"/>
    <line x1="55" y1="146" x2="295" y2="146" stroke="#2a3040" stroke-width="2"/>
    <line x1="55" y1="156" x2="295" y2="156" stroke="#2a3040" stroke-width="2"/>
    <line x1="55" y1="166" x2="295" y2="166" stroke="#2a3040" stroke-width="2"/>
    <line x1="55" y1="176" x2="295" y2="176" stroke="#2a3040" stroke-width="2"/>

    <!-- Brand strip -->
    <rect x="30" y="195" width="290" height="32" fill="#f7b32b"/>
    <text x="175" y="217" text-anchor="middle" font-family="Archivo Black, sans-serif" font-size="15" fill="#0e0e10" letter-spacing="3">HANUMANT</text>
    <rect x="30" y="227" width="290" height="2" fill="#c1502e"/>

    <!-- Control panel -->
    <rect x="70" y="245" width="210" height="105" rx="4" fill="#08090d" stroke="#2a2a2e" stroke-width="1"/>
    <rect x="85" y="258" width="105" height="42" rx="2" fill="#2a1800" stroke="#3a2400" stroke-width="1"/>
    <text x="137" y="282" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="15" font-weight="700" fill="#f7b32b">125 kVA</text>
    <text x="137" y="294" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="7" fill="#f7b32b" opacity="0.75">50.00Hz · 415V · 3φ</text>

    <!-- LEDs -->
    <circle cx="215" cy="265" r="4.5" fill="#a4f0a4"/>
    <text x="227" y="268" font-family="JetBrains Mono, monospace" font-size="7" fill="#a4f0a4">RUN</text>
    <circle cx="215" cy="280" r="4.5" fill="#ffc94a"/>
    <text x="227" y="283" font-family="JetBrains Mono, monospace" font-size="7" fill="#f7b32b">PWR</text>
    <circle cx="215" cy="295" r="4.5" fill="#1a1a1a" stroke="#444"/>
    <text x="227" y="298" font-family="JetBrains Mono, monospace" font-size="7" fill="#666">FLT</text>

    <!-- Knobs and meter -->
    <circle cx="95" cy="325" r="9" fill="#1a1a1a" stroke="#444"/>
    <line x1="95" y1="325" x2="95" y2="319" stroke="#f7b32b" stroke-width="2"/>
    <circle cx="123" cy="325" r="9" fill="#1a1a1a" stroke="#444"/>
    <line x1="123" y1="325" x2="128" y2="328" stroke="#f7b32b" stroke-width="2"/>
    <rect x="145" y="320" width="60" height="10" rx="1" fill="#1a1a1a" stroke="#444"/>
    <rect x="145" y="320" width="45" height="10" rx="1" fill="#f7b32b"/>
    <circle cx="240" cy="325" r="9" fill="#1a1a1a" stroke="#a4f0a4" stroke-width="1.5"/>
    <circle cx="240" cy="325" r="4" fill="#7fff7f"/>

    <!-- Bottom vents -->
    <rect x="50" y="365" width="250" height="75" rx="3" fill="url(#ventGrad)"/>
    <line x1="55" y1="378" x2="295" y2="378" stroke="#2a3040" stroke-width="1.5"/>
    <line x1="55" y1="388" x2="295" y2="388" stroke="#2a3040" stroke-width="1.5"/>
    <line x1="55" y1="398" x2="295" y2="398" stroke="#2a3040" stroke-width="1.5"/>
    <line x1="55" y1="408" x2="295" y2="408" stroke="#2a3040" stroke-width="1.5"/>
    <line x1="55" y1="418" x2="295" y2="418" stroke="#2a3040" stroke-width="1.5"/>
    <line x1="55" y1="428" x2="295" y2="428" stroke="#2a3040" stroke-width="1.5"/>

    <!-- Wheels -->
    <circle cx="70" cy="458" r="18" fill="#0a0a0a" stroke="#2a2a2e" stroke-width="2"/>
    <circle cx="70" cy="458" r="6" fill="#2a2a2e"/>
    <circle cx="280" cy="458" r="18" fill="#0a0a0a" stroke="#2a2a2e" stroke-width="2"/>
    <circle cx="280" cy="458" r="6" fill="#2a2a2e"/>
  </g>
</svg>
